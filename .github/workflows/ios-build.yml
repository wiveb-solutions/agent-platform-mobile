name: iOS CI/CD

on:
  push:
    branches: [main, master, 'feat/*', 'fix/*']
  pull_request:
    branches: [main, master]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=2"

jobs:
  # Job 1: Build iOS (simulator)
  build-ios:
    name: Build iOS Simulator
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS simulator
        run: ./gradlew :composeApp:assembleDebugIOSX64

      - name: Upload iOS framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: composeApp/build/cocoapods/Pods/
          retention-days: 14

  # Job 2: Build iOS Archive (si possible)
  build-ios-archive:
    name: Build iOS Archive
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS device
        run: ./gradlew :composeApp:assembleDebugIOSArm64

      - name: Upload iOS device framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-device-framework
          path: composeApp/build/cocoapods/Pods/
          retention-days: 14
